<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>로또명당 — 내 주변 1등 당첨 지점</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="./coords.js"></script>
<style>
  :root {
    --primary:   #12B981;
    --primary2:  #0B7A55;
    --primary-lt:#E7F7F0;
    --dark:      #16181A;
    --naver:     #03C75A;
    --bg:        #F6F7F4;
    --card-border:#EAECE6;
    --text:      #16181A;
    --text2:     #3B4038;
    --muted:     #8A8F86;
    --muted2:    #9AA096;
    --muted3:    #6B7069;
    --surface:   #F2F4EF;
    --divider:   #EEF0EB;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%;
    overflow:hidden;
    font-family:Pretendard,-apple-system,system-ui,'Noto Sans KR',sans-serif;
    background:var(--bg); color:var(--text);
  }
  ::-webkit-scrollbar { display:none; }

  @keyframes screenIn { from{opacity:0} to{opacity:1} }
  @keyframes sheetUp  { from{transform:translateY(100%)} to{transform:translateY(0)} }
  @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
  @keyframes toastIn  { from{opacity:0;transform:translate(-50%,10px)} to{opacity:1;transform:translate(-50%,0)} }
  @keyframes bounce   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }

  /* ── MAP ── */
  #map { position:fixed; inset:0; width:100%; height:100%; z-index:0; }

  /* ── TOP CHIPS + SEARCH ── */
  .top-bar {
    position:fixed; top:14px; left:14px; right:14px;
    z-index:6;
    display:flex; gap:8px; align-items:center;
  }
  .chip-scroll { flex:1; display:flex; gap:8px; overflow:auto; }
  .top-chip {
    display:flex; align-items:center; gap:5px;
    font-size:13px; font-weight:600; color:var(--text2);
    background:#fff; padding:11px 15px; border-radius:13px;
    white-space:nowrap; border:none; cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    font-family:inherit;
  }
  .top-chip.active {
    color:#fff; background:var(--dark); font-weight:800;
    box-shadow:0 4px 12px rgba(0,0,0,.14);
  }
  .search-sq {
    width:46px; height:46px; flex:0 0 46px; border-radius:14px;
    background:#fff; border:none; cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.12);
    display:flex; align-items:center; justify-content:center;
  }

  /* ── LATEST NOTICE ── */
  .notice-wrap {
    position:fixed; top:72px; left:0; right:0; z-index:5;
    display:flex; justify-content:center; pointer-events:none;
  }
  .notice-pill {
    display:flex; align-items:center; gap:7px;
    background:rgba(255,255,255,.85); backdrop-filter:blur(6px);
    color:var(--muted3); font-size:12px; font-weight:600;
    padding:6px 12px; border-radius:16px;
    box-shadow:0 2px 8px rgba(0,0,0,.07);
  }
  .notice-pill i { width:6px; height:6px; border-radius:50%; background:var(--primary); font-style:normal; }

  /* ── LOCATE (sheet 높이 따라 이동) ── */
  :root { --sheet-h: 31%; }
  .locate-btn {
    position:fixed; right:16px; z-index:7;
    width:48px; height:48px;
    border:none; border-radius:15px; background:#fff;
    box-shadow:0 6px 18px rgba(0,0,0,.16);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    bottom:calc(var(--sheet-h) + 14px);
    transition:bottom .34s cubic-bezier(.4,0,.2,1);
  }
  .locate-btn:active { transform:scale(.95); }

  /* ── SHEET BACKDROP (펼침 시 지도 탭으로 접기) ── */
  .sheet-backdrop { position:fixed; inset:0; z-index:7; display:none; }
  body.sheet-open .sheet-backdrop { display:block; }

  /* ── BOTTOM SHEET ── */
  .bottom-sheet {
    position:fixed; left:0; right:0; bottom:0; z-index:8;
    background:#fff; border-radius:26px 26px 0 0;
    box-shadow:0 -10px 34px rgba(0,0,0,.12);
    display:flex; flex-direction:column;
    height:31%;
    transition:height .34s cubic-bezier(.4,0,.2,1);
    overflow:visible;
    touch-action:none; /* 시트 전체가 드래그 영역 (스크롤 영역은 각자 pan-x/pan-y) */
  }
  .sheet-grip { display:flex; justify-content:center; padding:12px 0 4px; cursor:grab; flex-shrink:0; touch-action:none; user-select:none; }
  .sheet-grip div { width:44px; height:5px; border-radius:9px; background:#D8DBD3; }

  .sheet-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 20px 12px; flex-shrink:0;
  }
  .sheet-title { font-size:19px; font-weight:800; }
  .sheet-title .cnt { color:var(--muted2); font-weight:600; font-size:15px; }

  /* 커스텀 정렬 드롭다운 */
  .sort-wrap { position:relative; z-index:30; }
  .sort-btn {
    display:flex; align-items:center; gap:5px;
    font-size:14px; font-weight:600; color:var(--text2);
    background:var(--surface); border:none; font-family:inherit;
    padding:8px 12px; border-radius:10px; cursor:pointer;
  }
  .sort-menu {
    position:absolute; top:calc(100% + 6px); right:0;
    background:#fff; border-radius:14px;
    box-shadow:0 12px 32px rgba(0,0,0,.16);
    border:1px solid var(--divider);
    overflow:hidden; min-width:148px; display:none;
  }
  .sort-menu.open { display:block; }
  .sort-item {
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:12px 16px; font-size:14px; font-weight:600;
    color:var(--text2); cursor:pointer; background:#fff;
  }
  .sort-item.active { font-weight:800; color:var(--primary2); background:#F4FBF7; }
  .sort-item .ck { color:var(--primary); font-weight:800; display:none; }
  .sort-item.active .ck { display:inline; }

  /* 접힘: 가로 카드 스크롤 */
  .card-scroll {
    display:flex; gap:12px; overflow-x:auto; overflow-y:hidden;
    padding:0 16px 20px; flex:1; align-items:flex-start;
    touch-action:pan-x; /* 가로 스크롤은 네이티브, 세로 제스처는 시트 드래그로 */
  }
  body.sheet-open .card-scroll { display:none; }
  .h-card {
    flex:0 0 236px; background:#fff;
    border:1px solid var(--card-border); border-radius:18px;
    padding:15px; cursor:pointer;
  }
  .h-card.sel {
    background:#F4FBF7; border:1.5px solid var(--primary);
    box-shadow:0 6px 18px rgba(18,185,129,.12);
  }
  .h-card .hd { display:flex; align-items:center; justify-content:space-between; }
  .h-card .rank-chip {
    font-size:12px; font-weight:800; color:var(--muted);
    background:#EFF1EB; padding:3px 8px; border-radius:7px;
  }
  .h-card .rank-chip.gold {
    display:inline-flex; align-items:center; gap:3px;
    color:var(--primary2); background:#DBF3E8; padding:4px 9px; border-radius:8px;
  }
  .h-card .dist { font-size:12px; color:var(--muted); }
  .h-card .nm { font-size:18px; font-weight:800; margin:11px 0 2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .h-card .rg { font-size:13px; color:var(--muted3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .h-card .wl { display:flex; align-items:baseline; gap:6px; margin-top:12px; }
  .h-card .wl b { font-size:26px; font-weight:800; color:var(--primary2); line-height:1; }
  .h-card .wl span { font-size:13px; color:var(--muted3); }

  /* 펼침: 세로 리스트 */
  .row-list { flex:1; overflow-y:auto; overscroll-behavior:contain; padding:0 14px 20px; display:none; touch-action:pan-y; }
  body.sheet-open .row-list { display:block; }
  .s-row {
    display:flex; align-items:center; gap:14px;
    padding:14px 10px; cursor:pointer; border-radius:16px;
  }
  .s-row.sel { background:#F4FBF7; }
  .s-row .rk {
    width:38px; height:38px; flex:0 0 38px; border-radius:12px;
    background:#EBEEE8; color:var(--muted3);
    font-weight:800; font-size:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .s-row.sel .rk { background:var(--primary); color:#fff; }
  .s-row .inf { flex:1; min-width:0; }
  .s-row .nm { font-size:16px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .s-row .sub { font-size:13px; color:var(--muted3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .s-row .rt { text-align:right; flex-shrink:0; }
  .s-row .rt b { font-size:16px; font-weight:800; color:var(--primary2); }
  .s-row .rt div { font-size:11px; color:var(--muted2); }

  .empty-box { padding:32px 18px; text-align:center; color:var(--muted); }

  /* ── DETAIL SHEET ── */
  .detail-backdrop {
    position:fixed; inset:0; z-index:40;
    background:rgba(0,0,0,.18); display:none;
    animation:fadeIn .25s ease;
  }
  .detail-sheet {
    position:fixed; left:0; right:0; bottom:0; height:72%; z-index:41;
    background:var(--bg); border-radius:26px 26px 0 0;
    box-shadow:0 -14px 40px rgba(0,0,0,.2);
    display:none; flex-direction:column; overflow:hidden;
    animation:sheetUp .32s cubic-bezier(.4,0,.2,1);
  }
  .detail-backdrop.open { display:block; }
  .detail-sheet.open { display:flex; }
  .detail-body { flex:1; overflow-y:auto; padding:10px 20px 20px; }
  .d-badge {
    display:inline-flex; align-items:center; gap:4px;
    font-size:12px; font-weight:800; color:var(--primary2);
    background:var(--primary-lt); padding:5px 11px; border-radius:8px;
  }
  .d-name { font-size:25px; font-weight:800; margin:8px 0 0; }
  .d-sub  { font-size:14px; color:var(--muted3); margin-top:4px; }
  .d-stats { display:flex; gap:10px; margin-top:18px; }
  .d-stat { flex:1; background:#fff; border-radius:16px; padding:14px; text-align:center; }
  .d-stat b { font-size:22px; font-weight:800; }
  .d-stat b.grn { color:var(--primary2); }
  .d-stat div { font-size:12px; color:var(--muted3); margin-top:2px; }
  .d-sec { font-size:15px; font-weight:800; margin:24px 0 10px; }
  .d-hist { background:#fff; border-radius:16px; overflow:hidden; }
  .d-hrow { display:flex; align-items:center; gap:12px; padding:14px 16px; }
  .d-hrow + .d-hrow { border-top:1px solid var(--divider); }
  .d-hrow .rd { flex:1; font-size:14px; font-weight:600; }
  .d-hrow .dt { font-size:13px; color:var(--muted2); }
  .d-cta { padding:14px 20px 30px; background:linear-gradient(transparent,var(--bg) 30%); }
  .naver-btn {
    display:flex; align-items:center; justify-content:center; gap:9px;
    width:100%; height:54px; border-radius:16px;
    background:var(--naver); color:#fff;
    font-size:16px; font-weight:800; text-decoration:none;
    box-shadow:0 8px 20px rgba(3,199,90,.35);
  }
  .naver-btn:active { transform:scale(.98); }
  .naver-n {
    width:24px; height:24px; border-radius:7px;
    background:#fff; color:var(--naver);
    font-weight:900; font-size:15px;
    display:flex; align-items:center; justify-content:center;
  }

  /* ── SEARCH SCREEN (full) ── */
  .search-screen {
    position:fixed; inset:0; z-index:50;
    background:var(--bg);
    display:none; flex-direction:column;
    animation:screenIn .25s ease;
  }
  .search-screen.open { display:flex; }
  .ss-head { padding:18px 16px 8px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .ss-back {
    width:40px; height:40px; border-radius:13px; background:#fff; border:none;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 10px rgba(0,0,0,.06); cursor:pointer;
  }
  .ss-title { font-size:19px; font-weight:800; }
  .ss-body { flex:1; overflow-y:auto; padding:14px 16px 20px; }
  .ss-input-wrap {
    display:flex; align-items:center; gap:10px;
    background:#fff; border-radius:14px; padding:3px 15px;
    box-shadow:0 3px 10px rgba(0,0,0,.05);
  }
  .ss-input {
    flex:1; border:none; outline:none; background:none;
    font-size:15px; font-family:inherit; color:var(--text);
    padding:10px 0; font-weight:600;
  }
  .ss-input::placeholder { color:var(--muted2); font-weight:500; }
  .ss-sec { font-size:14px; font-weight:800; margin:22px 0 10px; }
  .ss-chips { display:flex; flex-wrap:wrap; gap:9px; }
  .ss-chip {
    font-size:14px; font-weight:600; color:var(--text2);
    background:#fff; padding:11px 16px; border-radius:12px;
    border:1px solid var(--card-border); cursor:pointer; font-family:inherit;
  }
  .ss-chip.on { font-weight:800; color:#fff; background:var(--dark); border-color:var(--dark); }
  .ss-cta-wrap { padding:14px 16px 26px; background:linear-gradient(transparent,var(--bg) 26%); flex-shrink:0; }
  .ss-cta {
    width:100%; height:54px; border-radius:16px; border:none;
    background:var(--primary); color:#fff;
    font-size:16px; font-weight:800; font-family:inherit; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 20px rgba(18,185,129,.4);
  }
  .ss-cta:active { transform:scale(.98); }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:calc(var(--sheet-h) + 76px); left:50%; transform:translateX(-50%);
    z-index:80; background:var(--dark); color:#fff;
    font-size:13px; font-weight:600; padding:11px 18px; border-radius:22px;
    box-shadow:0 8px 24px rgba(0,0,0,.28); white-space:nowrap;
    animation:toastIn .25s ease; display:none;
  }
  .toast.show { display:block; }

  /* ── MAP MARKERS ── */
  .nv-lead {
    width:150px; position:relative;
    display:flex; flex-direction:column; align-items:center;
    padding-top:16px;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.22));
  }
  .nv-lead .chip {
    position:absolute; top:0; left:20px; z-index:2;
    background:var(--dark); color:#fff;
    font-size:12px; font-weight:700;
    padding:5px 9px; border-radius:9px; line-height:1.1;
  }
  .nv-lead .bubble {
    background:#fff; border:1px solid var(--primary);
    border-radius:15px; padding:8px 13px;
    font-size:14px; font-weight:700; color:var(--text);
    white-space:nowrap; max-width:146px; overflow:hidden; text-overflow:ellipsis;
    box-shadow:0 4px 12px rgba(0,0,0,.16);
  }
  .nv-lead .tail {
    width:0; height:0;
    border-left:7px solid transparent; border-right:7px solid transparent;
    border-top:9px solid var(--primary); margin-top:-1px;
  }
  .nv-mini { width:150px; display:flex; justify-content:center; }
  .nv-mini .pill {
    background:#fff; border:1.5px solid #C5CBC2; border-radius:11px;
    padding:5px 10px; font-size:11px; font-weight:700; color:var(--text2);
    max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    box-shadow:0 3px 8px rgba(0,0,0,.14);
  }
  .nv-mini .pill.top { border-color:var(--primary); color:var(--primary2); }
  .nv-cluster {
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:var(--primary); border:3px solid #fff; border-radius:50%;
    box-shadow:0 4px 14px rgba(18,185,129,.45);
    cursor:pointer; color:#fff;
  }
  .nv-cluster-count { font-weight:800; font-size:16px; line-height:1; }
  .nv-cluster-label { font-size:9px; color:rgba(255,255,255,.85); margin-top:1px; }
  .my-dot {
    width:18px; height:18px;
    background:var(--primary); border:3px solid #fff; border-radius:50%;
    box-shadow:0 0 0 6px rgba(18,185,129,.25);
    animation:loc-p 2s ease-in-out infinite;
  }
  @keyframes loc-p {
    0%,100%{box-shadow:0 0 0 6px rgba(18,185,129,.25)}
    50%{box-shadow:0 0 0 12px rgba(18,185,129,.08)}
  }
</style>
</head>
<body>

<!-- Full-screen map -->
<div id="map"></div>

<!-- 상단 필터 칩 + 검색 -->
<div class="top-bar">
  <div class="chip-scroll">
    <button class="top-chip" id="chipNear" onclick="toggleFilter('near')">📍 내 주변</button>
    <button class="top-chip" id="chipTop30" onclick="toggleFilter('top30')">🏆 전국 TOP30</button>
  </div>
  <button class="search-sq" onclick="openSearch()" title="검색">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7.5" stroke="#16181A" stroke-width="2"/><path d="M17 17l4 4" stroke="#16181A" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
</div>

<!-- 최신 회차 알림 -->
<div class="notice-wrap">
  <div class="notice-pill"><i></i><span id="noticeTxt">최신 회차 불러오는 중…</span></div>
</div>

<!-- 현재 위치 버튼 -->
<button class="locate-btn" onclick="onLocate()" title="현재 위치">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="6" stroke="#12B981" stroke-width="2"/><circle cx="12" cy="12" r="1.7" fill="#12B981"/><path d="M12 1.5v3.5M12 19v3.5M1.5 12H5M19 12h3.5" stroke="#12B981" stroke-width="2" stroke-linecap="round"/></svg>
</button>

<!-- 펼침 상태에서 지도 영역 탭 → 접기 -->
<div class="sheet-backdrop" onclick="setSheet(false)"></div>

<!-- 바텀시트 -->
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-grip" id="sheetGrip" onclick="toggleSheet()"><div></div></div>
  <div class="sheet-header">
    <div class="sheet-title"><span id="sheetTitle">내 주변 명당</span> <span class="cnt" id="sheetCount"></span></div>
    <div class="sort-wrap">
      <button class="sort-btn" onclick="toggleSortMenu(event)">
        <span id="sortLabel">당첨많은순</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#3B4038" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="sort-menu" id="sortMenu">
        <div class="sort-item" data-sort="wins"   onclick="pickSort('wins')"><span>당첨많은순</span><span class="ck">✓</span></div>
        <div class="sort-item" data-sort="recent" onclick="pickSort('recent')"><span>최근순</span><span class="ck">✓</span></div>
        <div class="sort-item" data-sort="dist"   onclick="pickSort('dist')"><span>거리순</span><span class="ck">✓</span></div>
      </div>
    </div>
  </div>
  <div class="card-scroll" id="cardScroll"></div>
  <div class="row-list" id="rowList"></div>
</div>

<!-- 상세 시트 -->
<div class="detail-backdrop" id="detailBackdrop" onclick="closeDetail()"></div>
<div class="detail-sheet" id="detailSheet">
  <div class="sheet-grip" onclick="closeDetail()"><div></div></div>
  <div class="detail-body" id="detailBody"></div>
  <div class="d-cta" id="detailCta"></div>
</div>

<!-- 전체화면 검색 -->
<div class="search-screen" id="searchScreen">
  <div class="ss-head">
    <button class="ss-back" onclick="closeSearch()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="#16181A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="ss-title">지역·지점 검색</div>
  </div>
  <div class="ss-body">
    <div class="ss-input-wrap">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7.5" stroke="#9AA096" stroke-width="2"/><path d="M17 17l4 4" stroke="#9AA096" stroke-width="2" stroke-linecap="round"/></svg>
      <input class="ss-input" id="ssInput" type="text" placeholder="지점명 직접 검색 (예: 행운복권방)"
        oninput="updateCTA()" onkeydown="if(event.key==='Enter')applySearch()">
    </div>
    <div class="ss-sec">지역</div>
    <div class="ss-chips" id="regionChips"></div>
    <div class="ss-sec" id="districtSecTitle" style="display:none"></div>
    <div class="ss-chips" id="districtChips"></div>
  </div>
  <div class="ss-cta-wrap">
    <button class="ss-cta" id="ssCta" onclick="applySearch()">명당 보기</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ── 런타임 store 목록 ──────────────────────────────────
let stores = [];

// ── JSON 로드 & stores 변환 ──────────────────────────────────
async function loadStoresFromJSON() {
  try {
    const res = await fetch("./lotto_stores.json?v=" + Date.now(), { cache: "no-cache" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const meta = data.meta || {};
    const liveRound = meta.latestRound || 0;
    const notice = document.getElementById("noticeTxt");
    if (notice && liveRound) notice.textContent = `최신 ${liveRound}회 반영`;

    const rawStores = Object.values(data.stores || {});
    if (rawStores.length === 0) throw new Error("판매점 데이터 비어있음");

    stores = rawStores
      .sort((a, b) => b.wins - a.wins)
      .map((s, i) => {
        const coord = addrToLatLng(s.addr);
        const recentRound = s.lastRound || 0;
        return {
          id:        i + 1,
          name:      s.name,
          addr:      s.addr,
          region:    guessRegion(s.addr),
          wins:      s.wins,
          recent:    recentRound ? `${recentRound}회` : "-",
          recentNum: recentRound,
          type:      s.type || "자동",
          rounds:    s.rounds || [],
          lat:       coord.lat,
          lng:       coord.lng,
          rec:       s.wins >= 10,
          winRank:   0,
        };
      });

    // 전국 순위: 인터넷 판매처를 제외하고 당첨횟수순으로 부여
    let rk = 0;
    stores.forEach(s => {
      const internet = INTERNET_KW.some(kw => s.name.includes(kw) || s.addr.includes(kw));
      s.winRank = internet ? 0 : ++rk;
    });
    return true;
  } catch (err) {
    console.warn("데이터 로드 실패:", err.message);
    const isFileProtocol = location.protocol === "file:";
    showListMessage(
      isFileProtocol
        ? '⚠ 로컬 파일로 직접 열면 데이터를 불러올 수 없습니다.<br>python serve.py 실행 후 localhost:8080 으로 접속하세요.'
        : '⚠ lotto_stores.json 파일을 찾을 수 없습니다.'
    );
    return false;
  }
}

// 주소에서 시/구 추출
function guessRegion(addr) {
  const m = addr.match(/([가-힣]+(?:시|도))\s+([가-힣]+(?:구|시|군))/);
  if (m) return `${m[1].replace(/특별자치|광역|특별|자치/g,"")} ${m[2]}`;
  const m2 = addr.match(/([가-힣]+(?:시|도|구))/);
  return m2 ? m2[1] : addr.slice(0, 6);
}

// 회차 → 추첨일 (1회 = 2002.12.07, 매주 토요일)
function roundDate(n) {
  const d = new Date(2002, 11, 7);
  d.setDate(d.getDate() + (n - 1) * 7);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

// ── STATE ─────────────────────────────────────────────
const FALLBACK_CENTER = { lat: 37.5665, lng: 126.9780 }; // 서울시청 (위치 거부 시 기준점)
const NEAR_RADIUS_KM = 1;   // '내 주변' 필터 반경
const ROW_CHUNK = 50;       // 펼침 리스트 증분 렌더 단위
let map = null;
let markers = [];
let myMarker = null;
let userPos = null;
let activeFilter = null;          // 'near' | 'top30' | 'region' | null
let regionFilter = { region:'', district:'' };
let searchQuery = '';
let currentSort = 'wins';
let filtered = [];
let selectedId = null;
let rowRendered = 0;
let sheetExpanded = false;

// ── MAP INIT ──────────────────────────────────────────
function initMap(lat, lng, zoom) {
  if (typeof naver === 'undefined' || !naver.maps) return;
  map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(lat, lng),
    zoom: zoom || 13,
    mapTypeId: naver.maps.MapTypeId.NORMAL,
    mapDataControl: false,
    scaleControl: false,
    logoControlOptions: { position: naver.maps.Position.BOTTOM_RIGHT },
    zoomControlOptions: {
      position: naver.maps.Position.RIGHT_CENTER,
      style: naver.maps.ZoomControlStyle.SMALL
    }
  });
  bindMapEvents();
}

// ── CLUSTERING ────────────────────────────────────────
function clusterRadiusKm(zoom) {
  const table = {6:80, 7:50, 8:30, 9:20, 10:12, 11:7, 12:4, 13:2, 14:1, 15:0.5};
  return table[zoom] ?? (zoom >= 16 ? 0 : 100);
}

function buildClusters(list, zoom) {
  const radius = clusterRadiusKm(zoom);
  if (radius === 0) return list.map(s => ({ type:'single', store:s, lat:s.lat, lng:s.lng }));

  const used = new Array(list.length).fill(false);
  const clusters = [];
  for (let i = 0; i < list.length; i++) {
    if (used[i]) continue;
    const group = [list[i]];
    used[i] = true;
    for (let j = i + 1; j < list.length; j++) {
      if (used[j]) continue;
      if (dist(list[i].lat, list[i].lng, list[j].lat, list[j].lng) <= radius) {
        group.push(list[j]);
        used[j] = true;
      }
    }
    if (group.length === 1) {
      clusters.push({ type:'single', store:group[0], lat:group[0].lat, lng:group[0].lng });
    } else {
      const totalW = group.reduce((s, x) => s + x.wins, 0) || group.length;
      const lat = group.reduce((s, x) => s + x.lat * (x.wins || 1), 0) / totalW;
      const lng = group.reduce((s, x) => s + x.lng * (x.wins || 1), 0) / totalW;
      clusters.push({ type:'cluster', stores:group, count:group.length, lat, lng });
    }
  }
  return clusters;
}

function renderMarkers() {
  if (!map || typeof naver === 'undefined') return;
  markers.forEach(m => m.setMap(null));
  markers = [];

  const zoom = map.getZoom();
  // 선택된 지점은 클러스터에 묶이지 않고 항상 단독 표시
  const selStore = filtered.find(s => s.id === selectedId);
  const rest = selStore ? filtered.filter(s => s.id !== selectedId) : filtered;
  const clusters = buildClusters(rest, zoom);
  if (selStore) clusters.push({ type:'single', store:selStore, lat:selStore.lat, lng:selStore.lng });

  // filtered 순서 = 현재 정렬 순위
  const rankMap = new Map(filtered.map((s, i) => [s.id, i + 1]));

  clusters.forEach(c => {
    let html, anchor, zIndex = 5;

    if (c.type === 'single') {
      const s = c.store;
      const rank = rankMap.get(s.id) || 0;
      if (s.id === selectedId) {
        // 선택된 지점: 이름 말풍선 + 당첨횟수 칩
        html = `
          <div class="nv-lead">
            <div class="chip">${s.wins}회</div>
            <div class="bubble">${s.name}</div>
            <div class="tail"></div>
          </div>`;
        anchor = new naver.maps.Point(75, 62);
        zIndex = 20;
      } else {
        // 그 외: 점포명 라벨 (상위 3위는 초록 테두리)
        html = `<div class="nv-mini"><div class="pill ${rank>0 && rank<=3 ? 'top' : ''}">${s.name}</div></div>`;
        anchor = new naver.maps.Point(75, 13);
        zIndex = rank>0 && rank<=3 ? 8 : 5;
      }
    } else {
      const size = Math.max(44, Math.min(72, 36 + c.count * 2));
      html = `
        <div class="nv-cluster" style="width:${size}px;height:${size}px;">
          <span class="nv-cluster-count" style="font-size:${size>55?18:15}px">${c.count}</span>
          <span class="nv-cluster-label">지점</span>
        </div>`;
      anchor = new naver.maps.Point(size / 2, size / 2);
      zIndex = 10;
    }

    const m = new naver.maps.Marker({
      position: new naver.maps.LatLng(c.lat, c.lng),
      map,
      icon: { content: html, anchor },
      zIndex,
    });

    if (c.type === 'single') {
      naver.maps.Event.addListener(m, 'click', () => {
        if (c.store.id === selectedId) openDetail(c.store.id);
        else selectStore(c.store.id);
      });
    } else {
      naver.maps.Event.addListener(m, 'click', () => {
        const nextZoom = Math.min(map.getZoom() + 2, 16);
        map.setCenter(new naver.maps.LatLng(c.lat, c.lng));
        map.setZoom(nextZoom);
      });
    }
    markers.push(m);
  });
}

// ── 지오코딩 진행에 따른 점진적 핀 갱신 ────────────────
let _rmPending = false;
function scheduleRenderMarkers() {
  if (_rmPending) return;
  _rmPending = true;
  setTimeout(() => { _rmPending = false; if (map) renderMarkers(); }, 800);
}

function onGeoUpdate(isDone) {
  applyGeoCache(stores);
  scheduleRenderMarkers();
  if (isDone) refresh(); // 정확한 좌표 기준으로 거리/필터 최종 반영
}

function bindMapEvents() {
  if (!map) return;
  naver.maps.Event.addListener(map, 'zoom_changed', () => renderMarkers());
  naver.maps.Event.addListener(map, 'click', () => { closeDetail(); closeSortMenu(); });
}

// ── USER LOCATION ──────────────────────────────────────
function locateUser(cb) {
  if (!navigator.geolocation) { cb(null); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      placeMyMarker();
      cb(userPos);
    },
    () => { userPos = null; cb(null); }, // 거부/실패 → 서울시청 기준
    { timeout: 7000, enableHighAccuracy: true, maximumAge: 60000 }
  );
}

function placeMyMarker() {
  if (!userPos || !map || typeof naver === 'undefined') return;
  if (myMarker) myMarker.setMap(null);
  myMarker = new naver.maps.Marker({
    position: new naver.maps.LatLng(userPos.lat, userPos.lng),
    map,
    icon: { content: '<div class="my-dot"></div>', anchor: new naver.maps.Point(9, 9) }
  });
}

function onLocate() {
  activateNear(true);
}

// ── FILTER & SORT ──────────────────────────────────────
function dist(a, b, c, d) {
  const R = 6371, dl = (c-a)*Math.PI/180, dL = (d-b)*Math.PI/180;
  const x = Math.sin(dl/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dL/2)**2;
  return R*2*Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function distLabel(s) {
  const ref = userPos || FALLBACK_CENTER;
  const km = dist(s.lat, s.lng, ref.lat, ref.lng);
  return km < 1 ? Math.round(km * 1000) + 'm' : km.toFixed(1) + 'km';
}

const INTERNET_KW = ["인터넷", "dhlottery", "복권닷컴", "온라인", "동행복권", "www.", "http", ".co.kr", ".com"];

function baseStores() {
  return stores.filter(s =>
    !INTERNET_KW.some(kw => s.name.includes(kw) || s.addr.includes(kw))
  );
}

function buildList() {
  const base = baseStores();

  // ── 검색 모드: 검색어만 적용 ──
  if (searchQuery) {
    const q = searchQuery.replace(/\s/g, '');
    return base.filter(s => {
      const name   = (s.name   || '').replace(/\s/g, '');
      const addr   = (s.addr   || '').replace(/\s/g, '');
      const region = (s.region || '').replace(/\s/g, '');
      return name.includes(q) || addr.includes(q) || region.includes(q);
    }).sort((a,b) => b.wins - a.wins);
  }

  let list = [...base];
  if (activeFilter === 'top30') {
    return list.sort((a,b) => b.wins - a.wins).slice(0, 30);
  } else if (activeFilter === 'near') {
    const ref = userPos || FALLBACK_CENTER;
    list = list.filter(s => dist(s.lat, s.lng, ref.lat, ref.lng) <= NEAR_RADIUS_KM);
  } else if (activeFilter === 'region' && regionFilter.region) {
    list = list.filter(s => {
      const parts = s.addr.split(/\s+/);
      if (parts[0] !== regionFilter.region) return false;
      return !regionFilter.district || parts[1] === regionFilter.district;
    });
  }

  if (currentSort === 'wins')        list.sort((a,b) => b.wins - a.wins);
  else if (currentSort === 'recent') list.sort((a,b) => b.recentNum - a.recentNum);
  else if (currentSort === 'dist') {
    const ref = userPos || FALLBACK_CENTER;
    list.sort((a,b) => dist(a.lat,a.lng,ref.lat,ref.lng) - dist(b.lat,b.lng,ref.lat,ref.lng));
  }
  return list;
}

function refresh() {
  filtered = buildList();
  // 선택 지점이 목록에서 사라졌으면 선택 해제
  if (selectedId && !filtered.some(s => s.id === selectedId)) selectedId = null;
  if (!selectedId && filtered.length) selectedId = filtered[0].id;

  updateChips();
  renderSheet();
  if (map) renderMarkers();

  // 현재 보이는 지점들을 지오코딩 우선순위 맨 앞으로
  if (map && typeof geocodeStores === 'function') geocodeStores(filtered, onGeoUpdate);
}

function updateChips() {
  document.getElementById('chipNear').classList.toggle('active', activeFilter === 'near');
  document.getElementById('chipTop30').classList.toggle('active', activeFilter === 'top30');
}

// ── 시트 높이 관리 ────────────────────────────────────
// 접힘 높이 = 그립+헤더+카드 실제 콘텐츠 높이 (화면 비율이 아니라 내용 기준 → 카드 잘림 방지)
let collapsedH = 264;
let _dragActive = false;

function updateCollapsedH() {
  if (sheetExpanded) return; // 카드 영역이 보일 때만 측정 가능
  const grip   = document.getElementById('sheetGrip');
  const header = document.querySelector('.sheet-header');
  const cards  = document.getElementById('cardScroll');
  const card   = cards.querySelector('.h-card');
  const content = card ? card.offsetHeight + 20 /* card-scroll 하단 패딩 */ : cards.scrollHeight;
  const h = grip.offsetHeight + header.offsetHeight + content;
  if (h > 120) collapsedH = Math.min(h, window.innerHeight * 0.5);
}

function applySheetHeight() {
  if (_dragActive) return; // 드래그 중에는 손가락이 우선
  const sheet = document.getElementById('bottomSheet');
  const h = sheetExpanded ? Math.round(window.innerHeight * 0.74) : collapsedH;
  sheet.style.height = h + 'px';
  document.documentElement.style.setProperty('--sheet-h', h + 'px');
}

function setSheet(expanded) {
  sheetExpanded = expanded;
  document.body.classList.toggle('sheet-open', expanded);
  closeSortMenu();
  if (expanded) renderRows(true);
  else updateCollapsedH();
  applySheetHeight();
}
function toggleSheet() { setSheet(!sheetExpanded); }

window.addEventListener('resize', () => { updateCollapsedH(); applySheetHeight(); });

// 시트 전체를 드래그 영역으로: 세로 드래그 → 시트 이동, 가로 스와이프/리스트 스크롤은 그대로
let _suppressClick = false;
(function setupSheetDrag() {
  const sheet   = document.getElementById('bottomSheet');
  const rowList = document.getElementById('rowList');
  let startY = 0, startX = 0, lastY = 0, startH = 0;
  let tracking = false, fromRowList = false;

  sheet.addEventListener('pointerdown', e => {
    if (e.target.closest('.sort-menu') || e.target.closest('.sort-btn')) return;
    tracking = true; _dragActive = false;
    startY = lastY = e.clientY; startX = e.clientX;
    startH = sheet.getBoundingClientRect().height;
    fromRowList = !!e.target.closest('.row-list');
  });

  sheet.addEventListener('pointermove', e => {
    if (!tracking) return;
    lastY = e.clientY;
    const dy = e.clientY - startY; // 아래로 +
    const dx = e.clientX - startX;

    if (!_dragActive) {
      if (Math.abs(dy) < 10 || Math.abs(dy) <= Math.abs(dx)) return; // 미세 이동/가로 제스처
      // 펼침 리스트에서 시작한 경우: 맨 위에서 아래로 끌 때만 시트 드래그 (그 외엔 리스트 스크롤)
      if (fromRowList && !(rowList.scrollTop <= 0 && dy > 0)) { tracking = false; return; }
      _dragActive = true;
      sheet.style.transition = 'none';
      try { sheet.setPointerCapture(e.pointerId); } catch (_) {}
    }

    const vh = window.innerHeight;
    const h = Math.max(collapsedH, Math.min(vh * 0.74, startH - dy));
    sheet.style.height = h + 'px';
    document.documentElement.style.setProperty('--sheet-h', h + 'px');
  });

  const finish = () => {
    if (!tracking) return;
    tracking = false;
    if (!_dragActive) return;           // 드래그 아님 → 클릭/스크롤에 양보
    _dragActive = false;
    sheet.style.transition = '';
    _suppressClick = true;              // 드래그 직후 카드 클릭 오작동 방지
    setTimeout(() => { _suppressClick = false; }, 120);
    setSheet(lastY < startY);           // 위로 끌었으면 펼침, 아래면 접힘
  };
  sheet.addEventListener('pointerup', finish);
  sheet.addEventListener('pointercancel', finish);

  sheet.addEventListener('click', e => {
    if (_suppressClick) { e.stopPropagation(); e.preventDefault(); _suppressClick = false; }
  }, true);
})();

// ── 정렬 드롭다운 ─────────────────────────────────────
const SORT_LABELS = { wins:'당첨많은순', recent:'최근순', dist:'거리순' };
function toggleSortMenu(e) {
  e.stopPropagation();
  document.getElementById('sortMenu').classList.toggle('open');
}
function closeSortMenu() {
  document.getElementById('sortMenu').classList.remove('open');
}
function pickSort(v) {
  currentSort = v;
  closeSortMenu();
  refresh();
}
document.addEventListener('click', e => {
  if (!e.target.closest('.sort-wrap')) closeSortMenu();
});

// ── 시트 렌더링 ───────────────────────────────────────
function sheetTitleText() {
  if (searchQuery) return `"${searchQuery}" 검색 결과`;
  if (activeFilter === 'top30') return '전국 TOP30';
  if (activeFilter === 'region')
    return `${regionFilter.region}${regionFilter.district ? ' ' + regionFilter.district : ''} 명당`;
  return '내 주변 명당';
}

function renderSheet() {
  document.getElementById('sheetTitle').textContent = sheetTitleText();
  document.getElementById('sheetCount').textContent = filtered.length ? `${filtered.length}곳` : '';
  document.getElementById('sortLabel').textContent = SORT_LABELS[currentSort] || '정렬';
  document.querySelectorAll('.sort-item').forEach(el =>
    el.classList.toggle('active', el.dataset.sort === currentSort));
  renderCards();
  renderRows(true);
  updateCollapsedH();
  applySheetHeight();
}

function emptyBoxHTML() {
  if (!stores.length || !map) {
    return `<div class="empty-box" style="width:100%">
      <div style="font-size:28px;margin-bottom:10px;animation:bounce 1s ease-in-out infinite">🍀</div>
      <div style="font-size:13px">리스트를 불러오는 중입니다…</div>
    </div>`;
  }
  const msg = searchQuery
    ? `"${searchQuery}"에 해당하는 지점이 없습니다.`
    : activeFilter === 'near'
    ? `내 주변 ${NEAR_RADIUS_KM}km 안에 1등 배출 지점이 없습니다.`
    : '표시할 지점이 없습니다.';
  const sub = searchQuery
    ? '다른 검색어를 입력해 보세요.'
    : activeFilter === 'near'
    ? '🏆 전국 TOP30 버튼으로 명당을 찾아보세요.'
    : '';
  return `<div class="empty-box" style="width:100%">
    <div style="font-size:28px;margin-bottom:10px">🔍</div>
    <div style="font-size:13px">${msg}</div>
    ${sub ? `<div style="font-size:11px;margin-top:6px;opacity:.6">${sub}</div>` : ''}
  </div>`;
}

// 접힘: 가로 카드 (상위 12개)
function renderCards() {
  const wrap = document.getElementById('cardScroll');
  if (!filtered.length) {
    wrap.innerHTML = emptyBoxHTML();
    if (!stores.length || !map) document.getElementById('sheetCount').textContent = '';
    return;
  }
  wrap.innerHTML = filtered.slice(0, 12).map((s, i) => {
    const rank = i + 1, gold = rank === 1;
    return `
    <div class="h-card ${s.id===selectedId?'sel':''}" onclick="onCardTap(${s.id})" id="hc-${s.id}">
      <div class="hd">
        <span class="rank-chip ${gold?'gold':''}">${gold ? '👑 1위 명당' : rank + '위'}</span>
        <span class="dist">${distLabel(s)}</span>
      </div>
      <div class="nm">${s.name}</div>
      <div class="rg">${s.region}</div>
      <div class="wl"><b>${s.wins}</b><span>회 1등 배출</span></div>
    </div>`;
  }).join('') + '<div style="flex:0 0 8px"></div>';
  wrap.scrollLeft = 0; // 목록이 바뀌면 1위부터 보이도록
}

// 펼침: 세로 리스트 (증분 렌더 + 무한 스크롤)
function rowHTML(s, i) {
  return `
  <div class="s-row ${s.id===selectedId?'sel':''}" onclick="onRowTap(${s.id})" id="sr-${s.id}">
    <div class="rk">${i + 1}</div>
    <div class="inf">
      <div class="nm">${s.name}</div>
      <div class="sub">${s.region} · ${distLabel(s)}</div>
    </div>
    <div class="rt"><b>${s.wins}회</b><div>1등 배출</div></div>
  </div>`;
}

function renderRows(reset) {
  const wrap = document.getElementById('rowList');
  if (!filtered.length) { wrap.innerHTML = emptyBoxHTML(); rowRendered = 0; return; }
  if (reset) {
    rowRendered = Math.min(ROW_CHUNK, filtered.length);
    wrap.innerHTML = filtered.slice(0, rowRendered).map((s, i) => rowHTML(s, i)).join('');
    wrap.scrollTop = 0;
  }
}

function appendRows() {
  if (rowRendered >= filtered.length) return;
  const wrap = document.getElementById('rowList');
  const to = Math.min(rowRendered + ROW_CHUNK, filtered.length);
  const div = document.createElement('div');
  div.innerHTML = filtered.slice(rowRendered, to).map((s, i) => rowHTML(s, rowRendered + i)).join('');
  while (div.firstChild) wrap.appendChild(div.firstChild);
  rowRendered = to;
}

document.getElementById('rowList').addEventListener('scroll', function () {
  if (this.scrollTop + this.clientHeight > this.scrollHeight - 300) appendRows();
});

// ── 지점 선택 / 상세 ───────────────────────────────────
function onCardTap(id) {
  if (id === selectedId) { openDetail(id); return; } // 선택된 카드 재탭 → 상세
  selectStore(id);
}
function onRowTap(id) {
  if (id === selectedId) { openDetail(id); return; }
  selectStore(id);
  setSheet(false); // 리스트에서 고르면 지도가 보이게 접기
}

function selectStore(id) {
  const s = stores.find(x => x.id === id);
  if (!s) return;
  selectedId = id;

  // 하이라이트 갱신
  document.querySelectorAll('.h-card').forEach(el => el.classList.remove('sel'));
  document.querySelectorAll('.s-row').forEach(el => el.classList.remove('sel'));
  const hc = document.getElementById('hc-' + id);
  const sr = document.getElementById('sr-' + id);
  if (hc) { hc.classList.add('sel'); hc.scrollIntoView({inline:'nearest', block:'nearest', behavior:'smooth'}); }
  if (sr) sr.classList.add('sel');

  if (map && typeof naver !== 'undefined') map.panTo(new naver.maps.LatLng(s.lat, s.lng));
  renderMarkers();
}

// 네이버 지도 검색어: 정제된 도로명주소 (호수 등 세부주소 제외)
// 판매점 다수가 네이버 플레이스 미등록 가판점이라 상호 검색은 결과가 없음.
// 주소 검색은 등록 여부와 무관하게 항상 정확한 위치에 핀 표시됨.
function buildMapQuery(s) {
  return cleanAddr(s.addr || '');
}

function openDetail(id) {
  const s = stores.find(x => x.id === id);
  if (!s) return;
  selectedId = id;

  const gold = s.winRank === 1;
  const naverMapUrl = `https://map.naver.com/p/search/${encodeURIComponent(buildMapQuery(s))}`;
  const roundsDesc = [...s.rounds].sort((a, b) => b - a);
  const histRows = roundsDesc.map(r => `
    <div class="d-hrow">
      <span class="rd">${r}회</span>
      <span class="dt">${roundDate(r)}</span>
    </div>`).join('');

  document.getElementById('detailBody').innerHTML = `
    <div class="d-badge">${gold ? '👑 전국 1위 명당' : `전국 ${s.winRank}위 명당`}</div>
    <h2 class="d-name">${s.name}</h2>
    <div class="d-sub">${s.addr}</div>
    <div class="d-stats">
      <div class="d-stat"><b class="grn">${s.wins}</b><div>1등 배출</div></div>
      <div class="d-stat"><b>${s.recentNum || '-'}</b><div>최근 회차</div></div>
      <div class="d-stat"><b class="grn">${s.winRank}위</b><div>전국 순위</div></div>
    </div>
    <div class="d-sec">1등 배출 내역</div>
    <div class="d-hist">${histRows || '<div class="d-hrow"><span class="dt">내역 없음</span></div>'}</div>`;

  document.getElementById('detailCta').innerHTML = `
    <a class="naver-btn" href="${naverMapUrl}" target="_blank" rel="noopener noreferrer">
      <span class="naver-n">N</span> 네이버지도로 이동
    </a>`;

  document.getElementById('detailBackdrop').classList.add('open');
  document.getElementById('detailSheet').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailBackdrop').classList.remove('open');
  document.getElementById('detailSheet').classList.remove('open');
}

// ── FAB FILTER ────────────────────────────────────────
function activateNear(relocate) {
  activeFilter = 'near';
  regionFilter = { region:'', district:'' };
  currentSort = 'wins'; // 내 주변도 당첨 많은 순이 기본
  selectedId = null;    // 1위가 선택된 상태로 시작
  if (!relocate) { refresh(); return; }
  locateUser(pos => {
    const center = pos || FALLBACK_CENTER; // 거부 시 서울시청 기준
    if (map && typeof naver !== 'undefined') {
      map.setCenter(new naver.maps.LatLng(center.lat, center.lng));
      map.setZoom(15); // 반경 약 1km
    }
    refresh();
    flash(pos ? '📍 현재 위치로 이동했습니다' : '위치 권한이 없어 서울시청 기준으로 표시합니다');
  });
}

function toggleFilter(type) {
  // 검색 중에 필터 버튼을 누르면 검색 자동 초기화
  if (searchQuery) {
    searchQuery = '';
    const inp = document.getElementById('ssInput');
    if (inp) inp.value = '';
  }

  if (type === 'near') {
    // 내 주변은 토글이 아님 — 다시 눌러도 꺼지지 않고 위치만 새로고침
    activateNear(true);
    return;
  }

  // 전국 TOP30: 다시 누르면 내 주변으로 복귀
  if (activeFilter === 'top30') {
    activateNear(false);
    return;
  }
  activeFilter = 'top30';
  regionFilter = { region:'', district:'' };
  currentSort = 'wins';
  selectedId = null; // 1위가 선택된 상태로 시작
  refresh();
}

// ── 전체화면 검색 ─────────────────────────────────────
let ssRegion = '', ssDistrict = '';
const REGION_ORDER = ['서울','경기','인천','부산','대구','대전','광주','울산','세종','강원','충북','충남','전북','전남','경북','경남','제주'];

function regionCounts() {
  const cnt = {};
  baseStores().forEach(s => {
    const r = s.addr.split(/\s+/)[0];
    cnt[r] = (cnt[r] || 0) + 1;
  });
  return cnt;
}

function renderRegionChips() {
  const cnt = regionCounts();
  const regions = REGION_ORDER.filter(r => cnt[r]);
  document.getElementById('regionChips').innerHTML =
    `<button class="ss-chip ${!ssRegion?'on':''}" onclick="pickRegion('')">전체</button>` +
    regions.map(r =>
      `<button class="ss-chip ${ssRegion===r?'on':''}" onclick="pickRegion('${r}')">${r}</button>`
    ).join('');
  renderDistrictChips();
}

function renderDistrictChips() {
  const secTitle = document.getElementById('districtSecTitle');
  const wrap = document.getElementById('districtChips');
  if (!ssRegion) { secTitle.style.display = 'none'; wrap.innerHTML = ''; updateCTA(); return; }

  const cnt = {};
  baseStores().forEach(s => {
    const parts = s.addr.split(/\s+/);
    if (parts[0] !== ssRegion || !parts[1]) return;
    cnt[parts[1]] = (cnt[parts[1]] || 0) + 1;
  });
  const dists = Object.keys(cnt).sort((a, b) => cnt[b] - cnt[a]).slice(0, 24);

  secTitle.style.display = 'block';
  secTitle.textContent = `${ssRegion} · 시/구/군`;
  wrap.innerHTML =
    `<button class="ss-chip ${!ssDistrict?'on':''}" onclick="pickDistrict('')">전체</button>` +
    dists.map(d =>
      `<button class="ss-chip ${ssDistrict===d?'on':''}" onclick="pickDistrict('${d}')">${d}</button>`
    ).join('');
  updateCTA();
}

function pickRegion(r) { ssRegion = r; ssDistrict = ''; renderRegionChips(); }
function pickDistrict(d) { ssDistrict = d; renderDistrictChips(); }

function ctaCount() {
  const txt = document.getElementById('ssInput').value.trim();
  if (txt) {
    const q = txt.replace(/\s/g, '');
    return baseStores().filter(s =>
      (s.name||'').replace(/\s/g,'').includes(q) ||
      (s.addr||'').replace(/\s/g,'').includes(q) ||
      (s.region||'').replace(/\s/g,'').includes(q)).length;
  }
  if (ssRegion) {
    return baseStores().filter(s => {
      const parts = s.addr.split(/\s+/);
      return parts[0] === ssRegion && (!ssDistrict || parts[1] === ssDistrict);
    }).length;
  }
  return 0;
}

function updateCTA() {
  const n = ctaCount();
  document.getElementById('ssCta').textContent = n ? `명당 ${n}곳 보기` : '명당 보기';
}

function openSearch() {
  ssRegion = regionFilter.region;
  ssDistrict = regionFilter.district;
  document.getElementById('ssInput').value = searchQuery;
  renderRegionChips();
  updateCTA();
  document.getElementById('searchScreen').classList.add('open');
}
function closeSearch() { document.getElementById('searchScreen').classList.remove('open'); }

function applySearch() {
  const txt = document.getElementById('ssInput').value.trim();
  closeSearch();
  closeDetail();
  selectedId = null;

  if (txt) {
    searchQuery = txt;
    activeFilter = null;
    regionFilter = { region:'', district:'' };
    currentSort = 'wins';
    refresh();
    setSheet(true); // 검색 결과 리스트 바로 보여주기
    if (filtered.length && map && typeof naver !== 'undefined') {
      map.setCenter(new naver.maps.LatLng(filtered[0].lat, filtered[0].lng));
      map.setZoom(14);
    } else if (!filtered.length) {
      flash('검색 결과가 없습니다');
    }
    return;
  }

  if (ssRegion) {
    searchQuery = '';
    activeFilter = 'region';
    regionFilter = { region: ssRegion, district: ssDistrict };
    currentSort = 'wins';
    refresh();
    if (filtered.length && map && typeof naver !== 'undefined') {
      map.setCenter(new naver.maps.LatLng(filtered[0].lat, filtered[0].lng));
      map.setZoom(ssDistrict ? 13 : 11);
    }
    return;
  }

  // 아무것도 선택 안 함 → 내 주변 유지
  activateNear(false);
}

// ── TOAST ─────────────────────────────────────────────
let _toastTimer = null;
function flash(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 1700);
}

// ── 리스트 영역 메시지 (데이터 로드 실패 등) ─────────────
function showListMessage(html) {
  const box = `<div class="empty-box" style="width:100%"><div style="font-size:13px;line-height:1.8">${html}</div></div>`;
  document.getElementById('cardScroll').innerHTML = box;
  document.getElementById('rowList').innerHTML = box;
}

// ── BOOT ──────────────────────────────────────────────
const NAVER_CLIENT_ID = 'a5y7q9sxkg';

window.addEventListener('load', async () => {
  // 로딩 표시
  renderSheet();

  // 사전 지오코딩 좌표 로드 → 지점 데이터 로드 (좌표가 즉시 정확하게 매핑됨)
  await loadCoordCache('./coords_cache.json?v=' + Date.now());
  await loadStoresFromJSON();

  loadNaverMap(NAVER_CLIENT_ID);
});

function loadNaverMap(clientId) {
  if (!clientId || clientId === 'YOUR_CLIENT_ID') {
    showMapFallback('네이버 지도 API 키를 입력해주세요.');
    return;
  }

  const script = document.createElement('script');
  script.src = `https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=${clientId}&submodules=geocoder`;
  script.onload = () => {
    locateUser(pos => {
      try {
        // 항상 내 주변 반경 약 1km 줌으로 시작 (위치 거부 시 서울시청 중심)
        const center = pos || FALLBACK_CENTER;
        initMap(center.lat, center.lng, 15);
        if (pos) placeMyMarker();

        activeFilter = 'near';
        currentSort  = 'wins';
        refresh();

        // 화면에 보이는(필터된) 지점부터 정확한 좌표로 지오코딩, 나머지는 백그라운드
        const inView = new Set(filtered.map(s => s.id));
        const prioritized = [...filtered, ...stores.filter(s => !inView.has(s.id))];
        geocodeStores(prioritized, onGeoUpdate);
      } catch(e) {
        console.error('지도 초기화 오류:', e);
        showMapFallback('지도 초기화 중 오류가 발생했습니다.');
        refresh();
      }
    });
  };
  script.onerror = () => {
    showMapFallback('네이버 지도 API 로드 실패.<br>Client ID 또는 인터넷 연결을 확인하세요.');
  };
  document.head.appendChild(script);
}

function showMapFallback(msg) {
  document.getElementById('map').innerHTML = `
    <div style="position:absolute;inset:0;background:linear-gradient(135deg,#E7EBE4,#F6F7F4);
                display:flex;flex-direction:column;align-items:center;justify-content:center;
                gap:16px;padding:32px;text-align:center">
      <div style="font-size:48px">🗺️</div>
      <div style="font-size:18px;font-weight:800;color:var(--primary2)">네이버 지도 연동 필요</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.8;max-width:320px">
        ${msg}<br>
        <span style="font-size:11px;opacity:.7">지점 목록·검색·필터는 정상 작동합니다.</span>
      </div>
    </div>`;
  userPos = null;
  activeFilter = 'top30';
  currentSort  = 'wins';
  refresh();
}
</script>
