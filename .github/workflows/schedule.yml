name: Weekly Run

on:
  schedule:
    - cron: '10 12 * * 6'   # 한국시간 토요일 오후 9시 10분
  workflow_dispatch:

permissions:
  contents: write           # 결과 커밋/푸시에 필요

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python update_weekly.py --force   # 러너는 UTC라 시간체크 통과 못함 → --force
      - run: python crawl_missing.py           # 빠진 회차 자동 보충 (crawl_missing.py 올렸을 때)
      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lotto_stores.json
          git diff --cached --quiet || git commit -m "chore: weekly lotto data update"
          git push
