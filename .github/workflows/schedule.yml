name: Weekly Run

on:
  schedule:
    - cron: '10 12 * * 6'   # 한국시간 토요일 오후 9시 10분
  workflow_dispatch:         # 버튼으로 수동 실행도 가능

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python update_weekly.py